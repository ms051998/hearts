  .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(5,5,20,0.25) 0%,
      rgba(5,5,20,0.55) 60%,
      rgba(5,5,20,0.75) 100%
    );
    z-index: 1;
  }

    position: relative;
    z-index: 2;
    text-align: center;
    padding: 2rem;
    width: 100%;
  }

    font-family: "Playfair Display", serif;
    font-size: 3.2rem;
    font-weight: 400;
    color: #f5e6d0;
    letter-spacing: 0.1em;
    line-height: 1.1;
    margin-bottom: 0.3rem;
  }
  .heart {
    display: inline-block;
    color: #e8637a;
    font-size: 2.8rem;
    vertical-align: middle;
    animation: pulse 1.4s ease-in-out infinite;
    margin: 0 0.15em;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.22); }
  }
  .roka {
    font-family: "Playfair Display", serif;
    font-size: 2.1rem;
    font-style: italic;

    letter-spacing: 0.1em;
    margin-bottom: 0.5rem;

    font-family: "Cormorant Garamond", serif;
    font-size: 0.85rem;
    font-weight: 300;
    color: #c9b99a;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    margin-bottom: 1.5rem;
  }
  .timer-grid {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    gap: 0.7rem;
    margin-bottom: 1.6rem;
    flex-wrap: wrap;
  }
  .unit {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.35rem;
  }
  .number {
    font-family: "Playfair Display", serif;
    font-size: 3.6rem;
    font-weight: 700;
    color: #fdf6ec;
    line-height: 1;
    min-width: 90px;
    background: rgba(255,255,255,0.09);
    border: 1px solid rgba(255,255,255,0.16);
    border-radius: 12px;
    padding: 0.55rem 0.9rem;
    letter-spacing: -0.02em;
  }
  .lbl {
    font-size: 0.6rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: #b0a08a;
    font-weight: 300;
    font-family: "Cormorant Garamond", serif;
  }
  .sep {
    font-family: "Playfair Display", serif;
    font-size: 3rem;
    color: #e8637a;
    align-self: flex-start;
    padding-top: 0.45rem;
    font-weight: 300;
    opacity: 0.65;
  }
  .date-line {
    font-family: "Cormorant Garamond", serif;
    font-size: 1rem;
    color: #9a8878;
    letter-spacing: 0.15em;
    font-weight: 300;
  }
  .done-msg {
    font-family: "Playfair Display", serif;
    font-size: 2rem;
    color: #f5e6d0;
    font-style: italic;
    margin: 1rem 0;
  }
</style>

<body>
<div class="wrapper">
  <div class="bg-img"></div>
  <div class="overlay"></div>
  <div class="content">
    <div class="title-ms">M <span class="heart">&#9829;</span> S</div>
    <div class="roka">Roka</div>
    <div class="in-label">in</div>
    <div class="timer-grid" id="timer-grid">
      <div class="unit"><div class="number" id="days">--</div><div class="lbl">days</div></div>
      <div class="sep">:</div>
      <div class="unit"><div class="number" id="hours">--</div><div class="lbl">hours</div></div>
      <div class="sep">:</div>
      <div class="unit"><div class="number" id="mins">--</div><div class="lbl">minutes</div></div>
      <div class="sep">:</div>
      <div class="unit"><div class="number" id="secs">--</div><div class="lbl">seconds</div></div>
    </div>
    <div class="date-line">May 3, 2026 &nbsp;&middot;&nbsp; 4:00 PM EST</div>
  </div>
</div>
<script>
  var target = new Date("2026-05-03T16:00:00-05:00");
  function pad(n){ return String(n).padStart(2,"0"); }
  function tick(){
    var diff = target - new Date();
    if(diff <= 0){
      document.getElementById("timer-grid").innerHTML="<div class=done-msg>It&#39;s here! &#9829;</div>";
      return;
    }
    document.getElementById("days").textContent=Math.floor(diff/86400000);
    document.getElementById("hours").textContent=pad(Math.floor((diff%86400000)/3600000));
    document.getElementById("mins").textContent=pad(Math.floor((diff%3600000)/60000));
    document.getElementById("secs").textContent=pad(Math.floor((diff%60000)/1000));
  }
  tick();
  setInterval(tick,1000);
</script>
</body>
